<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Dad 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BACKGROUND */
body {
    font-family: 'Poppins', sans-serif;
    color: white;
    overflow-x: hidden;
    background: linear-gradient(180deg, #020111, #0a1a3c);
}

/* Glow */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 30%, rgba(59,130,246,0.2), transparent),
                radial-gradient(circle at 80% 70%, rgba(147,197,253,0.2), transparent);
    z-index: 0;
}

/* FIREWORKS */
.fireworks {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
}

/* ROCKET */
.rocket {
    position: absolute;
    width: 4px;
    height: 20px;
    background: white;
    border-radius: 2px;
}

/* SPARK */
.spark {
    position: absolute;
    width: 3px;
    height: 3px;
    background: orange;
    border-radius: 50%;
}

/* EXPLOSION */
.explosion {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
}

/* HERO */
.hero {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    z-index: 2;
    position: relative;
}

.hero h1 {
    font-size: clamp(30px, 5vw, 55px);
}

.cta-button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    background: white;
    color: #0a1a3c;
    border-radius: 30px;
    cursor: pointer;
}

/* GALLERY */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 900px;
    margin: auto;
    z-index: 2;
    position: relative;
}

/* PHOTO CARD */
.photo-card {
    height: 240px;
    overflow: hidden;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    padding: 8px;
    transform: translateY(30px);
    opacity: 0;
    transition: 0.6s;
}

/* IMAGE FIX */
.photo-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top; /* 👈 IMPORTANT */
    border-radius: 15px;
}

/* MESSAGE */
.message-section {
    padding: 60px 20px;
}

.message-card {
    max-width: 700px;
    margin: auto;
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 20px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
}

/* RESPONSIVE */
@media(max-width:900px){
    .gallery-grid {grid-template-columns: repeat(2,1fr);}
}
@media(max-width:500px){
    .gallery-grid {grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div id="fireworks" class="fireworks"></div>

<section class="hero">
    <h1>Happy Birthday Dad ❤️</h1>
    <button class="cta-button" onclick="scrollToSection('gallery')">Start 🎂</button>
</section>

<section id="gallery">
    <h2 style="text-align:center;margin-bottom:20px;">Our Memories</h2>

    <div class="gallery-grid">
        <div class="photo-card"><img src="./assets/photo1.jpeg"></div>
        <div class="photo-card"><img src="./assets/photo2.jpeg"></div>
        <div class="photo-card"><img src="./assets/photo3.jpeg"></div>

        <div class="photo-card"><img src="./assets/photo4.jpeg"></div>
        <div class="photo-card"><img src="./assets/photo5.jpeg"></div>
        <div class="photo-card"><img src="./assets/photo6.jpeg"></div>

        <div class="photo-card"><img src="./assets/photo7.jpeg"></div>
        <div class="photo-card"><img src="./assets/photo8.jpeg"></div>
        <div class="photo-card"><img src="./assets/photo9.jpeg"></div>
    </div>
</section>

<section class="message-section">
    <div class="message-card">
        <h2>A Special Message</h2>
        <p>Happy Birthday Dad ❤️</p>
        <p>You are my strength and inspiration.</p>
        <p>Thank you for everything.</p>
        <p><b>Love you always 💫</b></p>
    </div>
</section>

<footer>Made with ❤️ for Dad</footer>

<script>

/* SCROLL */
function scrollToSection(id) {
    document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* CARD ANIMATION */
const cards = document.querySelectorAll(".photo-card");
window.addEventListener("scroll", () => {
    const trigger = window.innerHeight * 0.85;
    cards.forEach(card => {
        if (card.getBoundingClientRect().top < trigger) {
            card.style.opacity = "1";
            card.style.transform = "translateY(0)";
        }
    });
});

/* 🚀 ROCKET FIREWORK */
function launchRocket() {
    const container = document.getElementById("fireworks");

    const rocket = document.createElement("div");
    rocket.classList.add("rocket");

    const x = Math.random() * window.innerWidth;
    const y = Math.random() * window.innerHeight/2;

    rocket.style.left = x + "px";
    rocket.style.bottom = "0px";

    container.appendChild(rocket);

    const anim = rocket.animate([
        { transform: "translateY(0)" },
        { transform: `translateY(-${window.innerHeight - y}px)` }
    ], { duration: 1200 });

    const trail = setInterval(() => createSpark(rocket), 50);

    anim.onfinish = () => {
        clearInterval(trail);
        rocket.remove();
        explode(x, y);
    };
}

/* SPARK */
function createSpark(rocket) {
    const container = document.getElementById("fireworks");
    const spark = document.createElement("div");
    spark.classList.add("spark");

    const rect = rocket.getBoundingClientRect();
    spark.style.left = rect.left + "px";
    spark.style.top = rect.top + "px";

    container.appendChild(spark);

    spark.animate([
        { opacity: 1 },
        { opacity: 0 }
    ], { duration: 500 }).onfinish = () => spark.remove();
}

/* EXPLOSION */
function explode(x, y) {
    const container = document.getElementById("fireworks");

    for (let i = 0; i < 40; i++) {
        const p = document.createElement("div");
        p.classList.add("explosion");

        const angle = Math.random() * 2 * Math.PI;
        const dist = Math.random() * 150;

        p.style.left = x + "px";
        p.style.top = y + "px";
        p.style.background = `hsl(${Math.random()*360},100%,60%)`;

        container.appendChild(p);

        p.animate([
            { transform: "translate(0,0)", opacity: 1 },
            { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`, opacity: 0 }
        ], { duration: 1500 }).onfinish = () => p.remove();
    }
}

setInterval(launchRocket, 800);

</script>

</body>
</html>
